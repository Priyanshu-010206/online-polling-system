<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Poll List</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="card">
    <h2 class="card-heading">Poll List</h2>

    <div th:if="${#lists.isEmpty(polls)}">
        <p class="muted-text">No polls yet. <a th:href="@{/polls/new}">Create one!</a></p>
    </div>

    <div th:each="poll : ${polls}" class="poll-row">
        <div class="poll-info">
            <p class="poll-title" th:text="${poll.title}">Poll Title</p>
            <p class="poll-desc">
                <strong>Description:</strong> <span th:text="${poll.description}">Description</span>
            </p>
        </div>
        <a class="vote-link" th:href="@{/polls/{id}/vote(id=${poll.id})}">Vote</a>
    </div>
</div>
</body>

</html>
